# Example configuration aligned with src/oasis/config.py.
# Replace paths and model specs for your environment.

seed = 42
dev_run = false
train = true
evaluate = true

[ingest]
source = "data/raw_vasp/systems"
dataset_name = "example_dataset"

[ingest.stoich]
elements = ["C", "O", "H"]
basis_species = ["CH4", "O2", "H2"]

[ingest.stoich.basis_composition]
CH4 = { C = 1, H = 4 }
O2 = { O = 2 }
H2 = { H = 2 }

[mlip]
dev_n = 2
dev_run = false
dataset = "data/datasets/example_adsorption.json"
optimizer = "LBFGS"

[mlip.models]
enabled = ["mace", "mattersim"]

[mlip.rootstock]
root = "/path/to/rootstock"
# python = "/path/to/rootstock/.venv/bin/python"

[mlip.rootstock.models.mace]
model = "mace"
mlip_name = "mace-mh-1"
checkpoint = "medium"
# output_model = "optional-output-name"
# model_version = "optional-version"
# [mlip.rootstock.models.mace.metadata]
# provider = "acme"

[mlip.rootstock.models.mattersim]
model = "mattersim"
mlip_name = "mattersim-v1-5m"
checkpoint = "models/mattersim/mattersim-v1.0.0-5M.pth"
# [mlip.rootstock.models.mattersim.metadata]
# provider = "acme"

[plot]
output_dir = "data/results/plots"

[experiment.learning_curve]
# Learning-curve sweep sizes refer to the outer training budget.
# Models that require validation spend part of that budget on inner validation.
# The test split is always an outer holdout used only for final evaluation.
# Validation-aware points are skipped when these minima cannot all fit together.
min_train = 5
max_train = 25
step = 1
validation_fraction = 0.2
# Minimum validation samples to carve out at all.
min_val_size = 1
# Stronger minimum for validation sets used to score/tune model choices.
min_tuning_val_size = 1
# Minimum inner-train samples left after validation is removed.
min_inner_train_size = 1
# Minimum outer-test samples left for final evaluation.
min_test_size = 1
# Repeats are independent outer splits at each training-budget value.
n_repeats = 10
# Optional directory for per-method cached learning-curve result artifacts.
# Typical workflow:
# 1. Run once with this path set to persist sweep results.
# 2. Keep `reuse_results = true` to regenerate plots from cache without retraining.
# 3. Use `force_refresh_methods` to rerun only selected methods and overwrite
#    just those artifacts.
# results_artifact_dir = "data/results/learning_curve"
# Optional single-file bundle for one dataset's saved learning-curve results.
# results_bundle_path = "data/results/learning_curve/example_dataset.json"
# If true, reuse compatible saved result artifacts when available.
# reuse_results = true
# Optional subset of enabled methods to rerun even if compatible artifacts exist.
# force_refresh_methods = ["moe", "probe_gnn"]

[experiment.learning_curve.graph_dataset]
# Reuse this aligned MLIP+graph artifact if it already exists; otherwise Oasis
# builds it from `mlip.dataset` atoms and saves it here.
path = "data/graphs/example_reactions.parquet"
# Must match a column in the filtered MLIP wide frame.
join_key = "reaction"

[plot.filters]
# adsorbate = "OH"
# anomaly_label = "normal"
# anomaly_label = "inference_anomaly"
# anomaly_label = "!adsorbate_migration"
# reaction_contains = ["Pt", "OH"]

[experiment.learning_curve.models]
use_ridge = true
use_kernel_ridge = false
use_lasso = false
use_elastic_net = false
use_residual = true
use_weighted_linear = false
use_weighted_simplex = false
use_graph_mean = false
use_latent = false

# Latent variable model: physics-informed decomposition of adsorption energies.
# Requires a pre-computed feature CSV (equation column used as the sample join key)
# and the vendor latent experiment config for model construction.
# [experiment.learning_curve.models.latent]
# experiment_config_path = "vendor/latent/config.toml"
# csv_path = "data/processed/data_6910487.csv"
# cobyla_initial_guess = 0.1   # COBYLA guest-parameter optimisation initial guess
# cobyla_max_iter = 100        # COBYLA iteration limit

[experiment.learning_curve.models.moe]
enabled = false
gate_type = "mlip_baseline"  # "mlip_baseline" | "gnn" | "schnet"
gating_mode = "dense"        # "dense" | "top_k"
top_k = 2                    # number of experts to activate; only used when gating_mode = "top_k"
# hidden_dims = [64, 64]     # gnn/schnet: fixes hidden_dim=64, n_layers=2; if empty Optuna searches both

# SchNet-specific settings (ignored for mlip_baseline and gnn).
# n_rbf = 20                 # number of Gaussian RBF basis functions for distance encoding
# r_max = 6.0                # distance cutoff in Å; should match your graph_dataset cutoff

[experiment.learning_curve.models.moe.training]
# GNN / SchNet gate training settings (ignored for mlip_baseline).
batch_size = 32
# eval_batch_size = 64
epochs = 100
# lr = 1e-3
# weight_decay = 0.0
# num_workers = 0
# device = "cpu"
# seed = 42

[experiment.learning_curve.models.moe.tuning.optuna]
# n_trials = 50
# sampler = "tpe"   # "tpe" (default), "random", "cmaes"
# pruner = "median"
# timeout_s = 600
# seed = 42

[experiment.learning_curve.models.gnn_direct]
enabled = false              # set true to run GNN direct regression (no probe features) as a baseline
# hidden_dims = [64, 64]    # fixes hidden_dim=64, n_layers=2; if empty Optuna searches both

[experiment.learning_curve.models.gnn_direct.training]
batch_size = 32
# eval_batch_size = 64
epochs = 100
# lr = 1e-3
# weight_decay = 0.0
# num_workers = 0
# device = "cpu"
# seed = 42

[experiment.learning_curve.models.gnn_direct.tuning.optuna]
# n_trials = 50
# sampler = "tpe"
# pruner = "median"
# timeout_s = 600
# seed = 42

[experiment.learning_curve.models.probe_gnn]
enabled = false              # set true to run probe-GNN direct regression
# hidden_dims = [64, 64]    # fixes hidden_dim=64, n_layers=2; if empty Optuna searches both

[experiment.learning_curve.models.probe_gnn.training]
batch_size = 32
# eval_batch_size = 64
epochs = 100
# lr = 1e-3
# weight_decay = 0.0
# num_workers = 0
# device = "cpu"
# seed = 42

# Optional probe-feature workflow config.
# [probe_features]
# dataset_path = "data/raw_data/example_adsorption.json"
# mlip_results_dir = "data/mlips/example_run"

[experiment.learning_curve.models.probe_gnn.tuning.optuna]
# n_trials = 50
# sampler = "tpe"   # "tpe" (default), "random", "cmaes"
# pruner = "median"
# timeout_s = 600
# seed = 42

[analysis]
run_adsorption_analysis = false
# calculating_path = "data/mlips/example_run"
# summary_workbook_path = "data/results/example/oasis_Benchmarking_Analysis.xlsx"
# comparison_workbook_path = "data/results/example_control/oasis_Benchmarking_Analysis.xlsx"
# comparison_plot_path = "data/results/plots/mae_comparison.png"
base_dir = "data/mlips/example_run"
out_dir = "data/mlips_by_prefix"
prefixes = ["ol", "sa", "ss"]
