seed = 42

# Example experiment-side configuration.
# Copy to `experiment.toml` and tune per study.
# This file owns dataset-profile, analysis, plot, probe-feature, and
# learning-curve settings. MLIP model registry details live in `mlip.toml`.

[dataset_profile]
tag = "example_oh"

[datasets.example_oh]
raw_dataset_filename = "ExampleOH_adsorption.json"
processed_basename = "example_oh"
mlip_run_dirname = "oh_example"
analysis_run_dirname = "ch3_oh_example"
summary_run_dirname = "ch3_oh_shifted_example"

[analysis]
run_adsorption_analysis = false
out_dir = "data/mlips_by_prefix"
prefixes = ["ol", "sa", "ss"]
# comparison_plot_path = "data/results/plots/shared_mae_comparison.png"

[plot]
output_dir = "data/results/plots"

[plot.filters]
# adsorbate = "OH"
# anomaly_label = "normal"
# anomaly_label = "inference_anomaly"
# anomaly_label = "!adsorbate_migration"
# reaction_contains = ["Pt", "OH"]

[experiment.learning_curve]
# Learning-curve sweep sizes refer to the outer training budget.
# Models that require validation spend part of that budget on inner validation.
# The test split is always an outer holdout used only for final evaluation.
# `budget_mode = "full_remainder_test"` keeps the current behavior, where the
# full dataset remainder becomes the outer test set.
# `budget_mode = "screening_fraction"` reserves part of the user-declared
# training budget for screening/evaluation instead.
# Validation-aware points are skipped when these minima cannot all fit together.
min_train = 5
max_train = 25
step = 1
budget_mode = "full_remainder_test" # or "screening_fraction"
# screen_fraction = 0.2
# min_screen_size = 1
validation_fraction = 0.2
min_val_size = 1
min_tuning_val_size = 1
min_inner_train_size = 1
min_test_size = 1
n_repeats = 10
# reuse_results = true
# force_refresh_methods = ["ridge"]
# force_refresh_train_sizes = { ridge = [5, 10], probe_gnn = [20] }

# Optional graph dataset artifact. Omit this section to rebuild graphs in
# memory each run and avoid writing an aligned Parquet cache.
#
# [experiment.learning_curve.graph_dataset]
# # `path` is derived from the active dataset profile.
# join_key = "reaction"

[experiment.learning_curve.models]
use_ridge = true
use_kernel_ridge = false
use_lasso = false
use_elastic_net = false
use_residual = true
use_weighted_linear = false
use_weighted_simplex = true
use_graph_mean = false
use_latent = true

[experiment.learning_curve.models.latent]
experiment_config_path = "vendor/latent/config.toml"
# Kept explicit because the vendor artifact name does not follow the dataset tag.
csv_path = "vendor/latent/data/processed/example_latent.csv"
cobyla_initial_guess = 0.1
cobyla_max_iter = 100

[experiment.learning_curve.models.moe]
enabled = false
gate_type = "schnet"  # "mlip_baseline" | "gnn" | "schnet"
gating_mode = "dense" # "dense" | "top_k"
# top_k = 2
n_rbf = 20
r_max = 6.0

[experiment.learning_curve.models.moe.training]
epochs = 50

[experiment.learning_curve.models.moe.tuning.optuna]
n_trials = 10
sampler = "tpe"

[experiment.learning_curve.models.gnn_direct]
enabled = false  # set true to run GNN direct regression (no probe features) as a baseline
# hidden_dims = [64, 64]

[experiment.learning_curve.models.gnn_direct.training]
epochs = 50

[experiment.learning_curve.models.gnn_direct.tuning.optuna]
n_trials = 10
sampler = "tpe"

[experiment.learning_curve.models.probe_gnn]
enabled = false # set true to run probe-GNN direct regression alongside MoE
# hidden_dims = [64, 64]

[experiment.learning_curve.models.probe_gnn.training]
epochs = 50

# Optional explicit overrides. When omitted, both paths are derived from
# `dataset_profile.tag` and `[datasets.<tag>]`.
#
# [probe_features]
# dataset_path = "data/raw_data/ExampleOH_adsorption_with_probe_ids.json"
# mlip_results_dir = "data/mlips/example_oh_unique_probes"

[experiment.learning_curve.models.probe_gnn.tuning.optuna]
n_trials = 10
sampler = "tpe"
