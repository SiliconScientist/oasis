seed = 42
dev_run = false
device = "cuda"

# Example experiment-side configuration.
# Copy to `experiment.toml` and tune per study.
# This file owns dataset-profile, analysis, plot, and learning-curve settings.

[dataset_profile]
tag = "example_oh"

[datasets.example_oh]
raw_dataset_filename = "ExampleOH_adsorption.json"
processed_basename = "example_oh"
mlip_run_dirname = "oh_example"
analysis_run_dirname = "ch3_oh_example"
summary_run_dirname = "ch3_oh_shifted_example"
probe_dataset_filename = "data/raw_data/ExampleOH_adsorption_with_probe_ids.json"
probe_mlip_results_dir = "data/mlips/example_oh_unique_probes"

[analysis]
run_adsorption_analysis = false
out_dir = "data/mlips_by_prefix"
prefixes = ["ol", "sa", "ss"]
# comparison_plot_path = "data/results/plots/shared_mae_comparison.png"

[plot]
output_dir = "data/results/plots"

[plot.curve_window]
# Optional x-axis window for learning-curve and screening plots.
# full_dataset_window = true  # ignore min_x/max_x but still honor include filters
# min_x = 10
# max_x = 50
# include_x = [10, 20, 30, 40, 50]
# include_fractions = [0.1, 0.2, 0.5, 0.9]

[experiment.defaults]
validation_fraction = 0.2
min_val_size = 1
min_tuning_val_size = 1
min_inner_train_size = 1
reuse_results = false
# force_refresh_methods = ["ridge"]

[experiment.learning_curve]
# Learning-curve sweep sizes refer to the outer training budget.
# Models that require validation spend part of that budget on inner validation.
# The test split is always an outer holdout used only for final evaluation.
# Validation-aware points are skipped when these minima cannot all fit together.
# Choose one sweep style:
# 1. contiguous integer range via `min_train` / `max_train` / `step`
# 2. explicit sparse counts via `sweep_sizes`
# 3. explicit dataset fractions via `sweep_fractions`
min_train = 5
max_train = 25
step = 1
# sweep_sizes = [5, 10, 20, 25]
# sweep_fractions = [0.1, 0.2, 0.3, 0.5, 0.7, 0.9]
min_test_size = 1
n_repeats = 10
# force_refresh_train_sizes = { ridge = [5, 10], probe_gnn = [20] }

# Anomaly-aware MLIP selection. Leave this off for the baseline comparison.
[experiment.learning_curve.mlip_selection]
# Optional explicit allowlist. Leave empty to use every discovered MLIP result.
# enabled = ["mace", "mattersim", "orb_v3", "sevennet", "uma"]
exclude_anomalous = false
label_allowlist = ["normal"]
strict_inference_anomaly = false

# OH-BMA comparison presets:
#
# Baseline:
# [dataset_profile]
# tag = "mamun_oh"
#
# [experiment.learning_curve.mlip_selection]
# exclude_anomalous = false
# label_allowlist = ["normal"]
# strict_inference_anomaly = false
#
# Filtered:
# [dataset_profile]
# tag = "mamun_oh"
#
# [experiment.learning_curve.mlip_selection]
# exclude_anomalous = true
# label_allowlist = ["normal"]
# strict_inference_anomaly = false
#
# Optional stricter filtered variant:
# [experiment.learning_curve.mlip_selection]
# exclude_anomalous = true
# label_allowlist = ["normal"]
# strict_inference_anomaly = true

[experiment.screening]
# Screening mode overlays the screening-specific knobs onto
# `[experiment.learning_curve]`.
# `budget_mode = "full_remainder_test"` keeps the current behavior, where the
# full dataset remainder becomes the outer test set.
# `budget_mode = "screening_fraction"` reserves part of the user-declared
# training budget for screening/evaluation instead.
budget_mode = "screening_fraction"
screen_fraction = 0.2
min_screen_size = 1
# results_bundle_path defaults to `data/results/screening/<dataset>.json`
# results_bundle_path = "data/results/screening/example_oh.json"
# force_refresh_train_sizes = { ridge = [10], weighted_simplex = [15] }

[candidate_ranking]
# Run with: `python -m oasis rank-candidates [config paths...]`
# Shot count is inferred from the validated references you provide here.
# With zero validated references, ranking falls back to the unfitted ensemble
# baseline. With one or more validated references, Oasis writes CV diagnostics
# for the feasible predictors from this list, and uses `selected_predictor`
# for the final screening decision.
predictors = ["residual", "weighted_simplex", "ridge"]
selected_predictor = "residual"
target_binding_energy = -0.5
top_k = 10
# validated_references_path = "data/validated_references/example.json"
# diagnostics_output_dir = "data/results/candidate_ranking/example_oh"
# Example JSON payload:
# [
#   {"adslab_id": "adslab-000001", "adsorption_energy": -0.42},
#   {"adslab_id": "adslab-000017", "adsorption_energy": -0.58}
# ]
score_function = "target_uncertainty_cost"  # or "weighted_sum"
target_uncertainty_alpha = 0.75
uncertainty_weight = 1.0
exclude_anomalous = true
label_allowlist = ["normal"]
strict_inference_anomaly = false
min_valid_mlips = 2
# `results_dir` defaults to the dataset profile's MLIP results directory.
# results_dir = "data/mlips/oh_example"
# Reserve per-predictor namespaces for future overrides.
# [candidate_ranking.predictor_configs.ridge]
# alpha_grid = [0.1, 1.0, 10.0]

# Optional graph dataset artifact. Omit this section to rebuild graphs in
# memory each run and avoid writing an aligned Parquet cache.
#
# [experiment.learning_curve.graph_dataset]
# # `path` is derived from the active dataset profile.
# join_key = "reaction"

[models]
use_ridge = true
use_kernel_ridge = false
use_lasso = false
use_elastic_net = false
use_residual = true
use_weighted_linear = false
use_weighted_simplex = true
use_graph_mean = false
use_gnn_direct = false
use_probe_gnn = false
use_latent = true

[models.latent]
experiment_config_path = "vendor/latent/config.toml"
# Kept explicit because the vendor artifact name does not follow the dataset tag.
csv_path = "vendor/latent/data/processed/example_latent.csv"

[models.moe]
enabled = false
gate_type = "schnet"  # "mlip_baseline" | "gnn" | "schnet"
gating_mode = "dense" # "dense" | "top_k"
# top_k = 2
n_rbf = 20
r_max = 6.0

# Optional fixed training overrides. Omit `epochs` to let Optuna tune it.
[models.moe.training]
# epochs = 50

[tuning.optuna]
n_trials = 10
sampler = "tpe"

# Optional explicit override. When omitted, probe paths are derived from
# `dataset_profile.tag` and `[datasets.<tag>]`.
#
# [probe_features]
# dataset_path = "data/raw_data/ExampleOH_adsorption_with_probe_ids.json"
# mlip_results_dir = "data/mlips/example_oh_unique_probes"
