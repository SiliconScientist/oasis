# Example MLIP-side configuration.
# Copy to `mlip.toml` and replace paths/model specs for your environment.

dev_run = false
train = true
evaluate = true

[dataset_profile]
tag = "mamun_oh"

[datasets.mamun_oh]
raw_dataset_filename = "MamunHighT2019_oh_adsorption.json"
processed_basename = "mamun_oh"
mlip_run_dirname = "oh_mamun"
analysis_run_dirname = "ch3_oh_mamun"
summary_run_dirname = "ch3_oh_shifted_mamun"

[ingest]
source = "data/raw_vasp/systems"
dataset_name = "rodrigo"

[ingest.stoich]
elements = ["C", "O", "H"]
basis_species = ["CH4", "O2", "H2"]

[ingest.stoich.basis_composition]
CH4 = { C = 1, H = 4 }
O2 = { O = 2 }
H2 = { H = 2 }

[mlip]
dev_n = 2
dev_run = false
optimizer = "FIRE"

[mlip.models]
enabled = ["mace", "mattersim", "orb_v3", "sevennet", "uma"]

[mlip.rootstock]
root = "/projects/bchg/rootstock"
# python = "/projects/bchg/rootstock/.venv/bin/python"

[mlip.rootstock.models.mace]
model = "mace"
mlip_name = "mace-mh-1"
checkpoint = "medium"
# output_model = "optional-output-name"
# model_version = "optional-version"
# [mlip.rootstock.models.mace.metadata]
# provider = "acme"

[mlip.rootstock.models.mattersim]
model = "mattersim"
mlip_name = "mattersim-v1-5m"
checkpoint = "models/mattersim/mattersim-v1.0.0-5M.pth"

[mlip.rootstock.models.orb_v3]
model = "orb_v3"
checkpoint = "orb_v3_conservative_inf_omat"
mlip_name = "orb-v3-conservative-inf-omat"

[mlip.rootstock.models.sevennet]
model = "sevennet"
checkpoint = "7net-omni"
mlip_name = "7net-omni"

[mlip.rootstock.models.sevennet.metadata]
modal = "mpa"

[mlip.rootstock.models.uma]
model = "uma"
checkpoint = "uma-s-1p1"
mlip_name = "uma-s-1p1"

[mlip.rootstock.models.uma.metadata]
task_name = "omat"

[analysis]
run_adsorption_analysis = false
# Kept explicit because this plot is currently shared rather than per-dataset.
comparison_plot_path = "data/results/plots/mae_comparison.png"
out_dir = "data/mlips_by_prefix"
prefixes = ["ol", "sa", "ss"]
